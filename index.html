<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정일기 - 당신의 마음을 읽어주는 공간</title>
    <meta name="description" content="AI 감정일기와 함께 당신의 하루를 기록하고 분석해보세요. 인공지능이 당신의 감정을 이해하고 따뜻한 답변을 전해드립니다.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <!-- Supabase CDN 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- 1. 로그인/회원가입 인증 화면 (기본 노출) -->
    <div id="auth-app" class="auth-container">
        <header class="auth-header">
            <h1 class="auth-title">AI 감정 일기</h1>
            <p class="auth-subtitle">오늘 하루의 마음을 안전하게 기록해보세요.</p>
        </header>
        <div class="auth-form">
            <div class="input-group">
                <input type="email" id="auth-email" placeholder="이메일 주소" required />
            </div>
            <div class="input-group">
                <input type="password" id="auth-password" placeholder="비밀번호" required />
            </div>
            <div class="auth-buttons">
                <button id="login-btn" class="btn btn-login">로그인</button>
                <button id="signup-btn" class="btn btn-signup">회원가입</button>
            </div>
            <div class="divider">
                <span>또는</span>
            </div>
            <button id="google-login-btn" class="btn btn-google">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                Google로 로그인
            </button>
        </div>
    </div>

    <!-- 2. 기존 일기장 메인 컨테이너 (인증 전까지 숨김 처리) -->
    <main class="container" id="diary-app" style="display: none;">
        <header>
            <div class="header-top">
                <button id="logout-btn" class="btn-text">로그아웃</button>
            </div>
            <h1 id="main-title">오늘 하루는 어땠나요?</h1>
            <button id="reset-api-key-btn" class="btn-text">AI API Key 재설정</button>
        </header>

        <section class="input-section">
            <div id="visualizer" class="visualizer-container">
                <!-- 파형 바 20개가 자바스크립트로 생성됩니다 -->
            </div>
            <textarea id="diary-input" placeholder="오늘 느꼈던 감정과 일들을 자유롭게 적어보세요..."></textarea>
        </section>

        <section class="button-group">
            <button id="voice-btn" class="btn btn-voice">
                <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                    <line x1="12" y1="19" x2="12" y2="23" />
                    <line x1="8" y1="23" x2="16" y2="23" />
                </svg>
                음성으로 입력하기
            </button>
            <button id="analyze-btn" class="btn btn-analyze">
                <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                    <line x1="12" y1="22.08" x2="12" y2="12" />
                </svg>
                분석 요청하기
            </button>
        </section>

        <section class="ai-response-section">
            <h2 id="ai-response-title">AI의 답변</h2>
            <div id="ai-response-box" class="ai-box">
                여기에 AI의 답변이 표시됩니다.
            </div>
        </section>

        <!-- 이전 AI 분석 히스토리 섹션 추가 -->
        <section class="history-section">
            <h2>이전 분석 기록</h2>
            <div id="history-container" class="history-list">
                <!-- 히스토리 아이템들이 자바스크립트에 의해 여기에 렌더링됩니다 -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
